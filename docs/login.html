<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Assassins Login</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111c;
        --panel: #101c2b;
        --panel-2: #14253a;
        --text: #e8eef7;
        --muted: #98abc2;
        --accent: #71d7ff;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(113, 215, 255, 0.12), transparent 35%),
          linear-gradient(180deg, #09121e, #060b12);
        color: var(--text);
      }

      .panel {
        width: min(480px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 18px;
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-block;
        padding: 12px 16px;
        border-radius: 12px;
        text-decoration: none;
        background: var(--accent);
        color: #06202a;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>AI Assassins Login</h1>
      <p>This static GitHub Pages login entry currently routes operators back to the main dashboard build.</p>
      <a href="./dashboard.html">Open Dashboard</a>
    </main>
  </body>
</html>
