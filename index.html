<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Assassins Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111c;
        --panel: #101c2b;
        --panel-2: #14253a;
        --text: #e8eef7;
        --muted: #98abc2;
        --accent: #71d7ff;
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(113, 215, 255, 0.12), transparent 35%),
          linear-gradient(180deg, #09121e, #060b12);
        color: var(--text);
      }

      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.5rem);
        letter-spacing: -0.03em;
      }

      .sub {
        margin: 8px 0 0;
        color: var(--muted);
        max-width: 720px;
        line-height: 1.5;
      }

      .build {
        white-space: nowrap;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--accent);
        font-size: 0.85rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid var(--border);
        min-height: 180px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      }

      .label {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .value {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        background: var(--accent);
        color: #06202a;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <h1>AI Assassins</h1>
          <p class="sub">
            Live ARCHAIOS intelligence dashboard wired to the production worker.
          </p>
        </div>
        <div class="build" id="build-marker">build: archaios-pages-2026-03-06-01</div>
      </section>

      <section class="grid">
        <article class="card">
          <p class="label">Overnight Overview</p>
          <p class="value" id="market-analysis">Generating intelligence brief...</p>
        </article>
        <article class="card">
          <p class="label">Mission Priorities</p>
          <p class="value" id="mission-priorities">Generating intelligence brief...</p>
        </article>
        <article class="card">
          <p class="label">Command Note</p>
          <p class="value" id="command-note">Generating intelligence brief...</p>
        </article>
      </section>

      <div class="actions">
        <button id="refresh-brief" type="button">Generate Brief</button>
        <button class="secondary" id="copy-worker" type="button">Copy Worker URL</button>
      </div>
    </main>

    <script>
      const WORKER_URL = "https://archaios-saas-worker.quandrix357.workers.dev";
      const BUILD_VERSION = "archaios-pages-2026-03-06-01";

      const marketAnalysis = document.getElementById("market-analysis");
      const missionPriorities = document.getElementById("mission-priorities");
      const commandNote = document.getElementById("command-note");
      const refreshButton = document.getElementById("refresh-brief");
      const copyWorkerButton = document.getElementById("copy-worker");

      console.log("AI Assassins live build using worker:", WORKER_URL);
      console.log("AI Assassins build version:", BUILD_VERSION);

      async function loadBrief() {
        marketAnalysis.textContent = "Generating intelligence brief...";
        missionPriorities.textContent = "Generating intelligence brief...";
        commandNote.textContent = "Generating intelligence brief...";

        const response = await fetch(`${WORKER_URL}/api/brief`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: "guest-free",
            tier: "free",
            location: "Chicago",
            focus: "market expansion",
            tone: "direct",
            prompt: "Generate a daily intelligence brief"
          })
        });

        const data = await response.json();
        console.error("Brief API response:", data);

        if (!response.ok || !data.brief) {
          const message = data.error || "brief_generation_failed";
          marketAnalysis.textContent = message;
          missionPriorities.textContent = message;
          commandNote.textContent = message;
          throw new Error(message);
        }

        marketAnalysis.textContent = data.brief.summary;
        missionPriorities.textContent = data.brief.content.split("\n")[0];
        commandNote.textContent = data.brief.title;
      }

      refreshButton.addEventListener("click", () => {
        loadBrief().catch((error) => console.error("Brief request error", error));
      });

      copyWorkerButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(WORKER_URL);
        } catch (error) {
          console.error("Clipboard error", error);
        }
      });

      loadBrief().catch((error) => console.error("Brief request error", error));
    </script>
  </body>
</html>
